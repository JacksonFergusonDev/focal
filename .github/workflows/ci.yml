name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Test on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.14"]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    # 1. Linux Dependency Routing
    - name: Install System Dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y shellcheck shfmt bats

    # 2. macOS Dependency Routing
    - name: Install System Dependencies (macOS)
      if: runner.os == 'macOS'
      run: brew install shellcheck shfmt bats-core

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --group ci

    - name: Lint with Ruff
      run: |
        uv run ruff check .
        uv run ruff format --check .

    - name: Type check with Mypy
      run: uv run mypy .

    - name: Run tests
      run: uv run pytest

    - name: Lint shell scripts with Shellcheck
      run: find bin libexec lib -maxdepth 1 -type f -exec shellcheck --severity=warning {} +

    - name: Run Bash tests
      run: bats tests/bash/

    - name: Lint Markdown
      uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9 # v23
      with:
        globs: '**/*.md'
